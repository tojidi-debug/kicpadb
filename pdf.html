<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocFlow — PDF 도구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{--border:#bae6fd;--accent:#0284c7;--navy:#1e40af;--green:#059669;--red:#dc2626;--muted:#64748b;--text:#0c1a2e;--sans:'Noto Sans KR',sans-serif;--mono:'Space Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:linear-gradient(170deg,#fff 0%,#e0f2fe 55%,#bae6fd 100%);background-attachment:fixed;color:var(--text);font-family:var(--sans);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 10%,rgba(186,230,253,.5) 0%,transparent 50%),radial-gradient(ellipse at 90% 90%,rgba(125,211,252,.35) 0%,transparent 50%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:16px 20px 80px;}
.page-title{text-align:center;margin-bottom:16px;}
.page-title h1{font-size:22px;font-weight:700;color:var(--navy);}
.page-title p{font-size:13px;color:var(--muted);margin-top:4px;}

/* ilovepdf 버튼 바 */
.ilove-bar{display:flex;gap:5px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border:1px solid #bae6fd;border-radius:14px;padding:8px 14px;margin-bottom:14px;box-shadow:0 2px 12px rgba(2,132,199,.1);flex-wrap:wrap;align-items:center;}
.ilove-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;white-space:nowrap;margin-right:4px;}
.ilove-btn{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;border:none;border-radius:8px;padding:7px 11px;font-size:12px;font-family:var(--sans);font-weight:600;cursor:pointer;text-decoration:none;transition:all .18s;white-space:nowrap;box-shadow:0 2px 8px rgba(220,38,38,.22);}
.ilove-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(220,38,38,.38);}
.ilove-sep{width:1px;height:20px;background:#fca5a5;opacity:.5;flex-shrink:0;margin:0 1px;}
.ilove-note{font-size:10px;color:var(--muted);margin-left:auto;white-space:nowrap;}

/* 드롭존 */
.dropzone{border:2px dashed #7dd3fc;border-radius:16px;padding:44px 32px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(255,255,255,.65);backdrop-filter:blur(8px);position:relative;overflow:hidden;box-shadow:0 2px 20px rgba(2,132,199,.08);}
.dropzone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -10%,rgba(125,211,252,.18),transparent 60%);pointer-events:none;}
.dropzone:hover,.dropzone.drag-over{border-color:var(--accent);background:rgba(255,255,255,.95);transform:translateY(-2px);box-shadow:0 10px 36px rgba(2,132,199,.18);}
.dz-icon{font-size:48px;margin-bottom:14px;display:block;}
.dz-title{font-size:16px;font-weight:600;margin-bottom:8px;}
.dz-hint{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.btn-browse{display:inline-block;background:linear-gradient(135deg,#1e40af,#2563eb,#0ea5e9);color:#fff;border:none;border-radius:9px;padding:10px 26px;font-size:14px;font-family:var(--sans);font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 18px rgba(30,64,175,.32);}
.btn-browse:hover{transform:translateY(-2px);}
input[type="file"]{display:none;}
.info-card{background:rgba(224,242,254,.8);border:1px solid rgba(2,132,199,.2);border-radius:12px;padding:14px 18px;margin-top:14px;font-size:13px;color:var(--muted);line-height:1.7;}
.info-card strong{color:var(--text);}

/* 툴바 */
.edit-toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding:12px 16px;background:rgba(255,255,255,.78);backdrop-filter:blur(8px);border:1px solid #bae6fd;border-radius:12px;align-items:center;}
.tool-btn{display:flex;align-items:center;gap:5px;background:#f0f9ff;border:1px solid #bae6fd;color:var(--text);border-radius:8px;padding:8px 13px;font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .2s;font-weight:500;white-space:nowrap;}
.tool-btn:hover{background:rgba(2,132,199,.1);border-color:var(--accent);color:var(--accent);}
.tool-btn.danger:hover{background:rgba(220,38,38,.08);border-color:var(--red);color:var(--red);}
.tool-btn.success{background:linear-gradient(135deg,#059669,#10b981);border-color:#059669;color:#fff;font-weight:700;}
.tool-btn.success:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(5,150,105,.35);}
.tool-btn:disabled{opacity:.4;cursor:not-allowed;}
.tool-sep{width:1px;height:26px;background:#bae6fd;margin:0 2px;flex-shrink:0;}
.sel-count{font-size:11px;color:var(--muted);font-family:var(--mono);margin-left:auto;}

/* 페이지 그리드 */
.page-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-top:14px;}
.page-card{background:rgba(255,255,255,.88);border:2px solid #bae6fd;border-radius:10px;overflow:hidden;cursor:grab;transition:all .2s;position:relative;user-select:none;}
.page-card:active{cursor:grabbing;}
.page-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(2,132,199,.15);}
.page-card.selected{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,64,175,.18);}
.page-card.dragging{opacity:.35;transform:scale(.96);}
.page-card.drag-over-top{border-top:3px solid var(--green);}
.page-card.drag-over-bottom{border-bottom:3px solid var(--green);}
.page-thumb{width:100%;aspect-ratio:0.707;background:#f1f5f9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.page-thumb canvas{width:100%!important;height:100%!important;object-fit:contain;display:block;}
.page-thumb .ls{font-size:22px;animation:spin 1s linear infinite;color:var(--accent);}
.page-footer{padding:7px 8px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #e0f2fe;background:rgba(255,255,255,.6);}
.page-num{font-size:11px;font-family:var(--mono);color:var(--muted);}
.page-check{width:15px;height:15px;accent-color:var(--navy);cursor:pointer;}
.page-copy-badge{position:absolute;top:4px;right:4px;background:rgba(124,58,237,.85);color:#fff;border-radius:4px;font-size:9px;font-family:var(--mono);padding:2px 5px;}

/* 진행 */
.progress-area{margin-top:14px;display:none;}
.prog-text{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:8px;}
.prog-bar{height:6px;background:#bae6fd;border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#1e40af,#0ea5e9);border-radius:4px;width:0%;transition:width .4s ease;}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border:1px solid #bae6fd;border-radius:16px;padding:28px 32px;max-width:420px;width:90%;animation:fadeUp .22s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:10px;}
.modal p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:18px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-ok{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;}

@media(max-width:580px){
  .ilove-btn{font-size:11px;padding:6px 8px;}
  .ilove-note{display:none;}
  .page-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-title">
    <h1>✂️ PDF 편집 도구</h1>
    <p>페이지 순서 변경 · 삭제 · 복사 · 다른 PDF 삽입 · 저장</p>
  </div>

  <!-- ilovepdf 서비스 버튼 모음 -->
  <div class="ilove-bar">
    <span class="ilove-label">🔗 ilovepdf</span>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/compress_pdf');return false;">📉 PDF 압축</a>
    <div class="ilove-sep"></div>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/pdf_to_excel');return false;">🔄 PDF→Excel</a>
    <div class="ilove-sep"></div>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/pdf_to_word');return false;">🔄 PDF→word</a>
    <div class="ilove-sep"></div>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/merge_pdf');return false;">🔗 PDF 합치기</a>
    <div class="ilove-sep"></div>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/split_pdf');return false;">✂️ PDF 분할</a>
    <div class="ilove-sep"></div>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/rotate_pdf');return false;">🔄 페이지회전</a>
    <div class="ilove-sep"></div>
    <a class="ilove-btn" href="#" onclick="openIlove('https://www.ilovepdf.com/ko/add_pdf_page_number');return false;">🔢 Page#추가</a>
<div class="ilove-sep"></div>
  </div>

  <!-- PDF 편집 -->
  <div class="dropzone" id="dz-edit"
       ondragover="event.preventDefault();this.classList.add('drag-over')"
       ondragleave="this.classList.remove('drag-over')"
       ondrop="handleDrop(event)"
       onclick="document.getElementById('fi-edit').click()">
    <span class="dz-icon">📄</span>
    <h3 class="dz-title">편집할 PDF 파일을 드래그하거나 클릭하세요</h3>
    <p class="dz-hint">페이지 순서 변경(드래그) · 삭제 · 복사 · 다른 PDF 삽입</p>
    <button class="btn-browse" onclick="event.stopPropagation();document.getElementById('fi-edit').click()">파일 선택</button>
    <input type="file" id="fi-edit" accept=".pdf" onchange="loadEditPdf(event)">
  </div>

  <div id="editArea" style="display:none;">
    <div class="edit-toolbar">
      <button class="tool-btn" onclick="editSelectAll()">☑️ 전체선택</button>
      <button class="tool-btn" onclick="editSelectNone()">◻️ 해제</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="editMoveUp()">⬆️ 앞으로</button>
      <button class="tool-btn" onclick="editMoveDown()">⬇️ 뒤로</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="editCopy()">📋 복사</button>
      <button class="tool-btn danger" onclick="editDelete()">🗑️ 삭제</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="document.getElementById('fi-insert').click()">➕ PDF 삽입</button>
      <input type="file" id="fi-insert" accept=".pdf" onchange="editInsertPdf(event)" style="display:none">
      <div class="tool-sep"></div>
      <button class="tool-btn success" onclick="editSave()">⬇️ PDF 저장</button>
      <span class="sel-count" id="selCount">선택: 0 / 0</span>
    </div>
    <div class="info-card">💡 <strong>드래그</strong>로 페이지 순서 변경 · 카드 클릭 또는 체크박스로 선택</div>
    <div class="page-grid" id="pageGrid"></div>
    <div class="progress-area" id="prog">
      <div class="prog-text" id="progTxt">처리 중...</div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">알림</h3>
    <p id="modal-body"></p>
    <div class="modal-btns"><button class="btn-ok" onclick="document.getElementById('modal').classList.remove('show')">확인</button></div>
  </div>
</div>

<script>
if(typeof pdfjsLib!=='undefined')
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ilovepdf 동일 탭 오픈 */
let iloveWin=null;
function openIlove(url){
  if(!iloveWin||iloveWin.closed){
    iloveWin=window.open(url,'ilovepdf_tab');
  }else{
    iloveWin.location.href=url;
    iloveWin.focus();
  }
}

/* 편집 상태 */
const E={pages:[],fname:'',blobUrl:null,dragSrc:-1};

function handleDrop(e){
  e.preventDefault();document.getElementById('dz-edit').classList.remove('drag-over');
  const f=[...e.dataTransfer.files].find(f=>f.name.toLowerCase().endsWith('.pdf'));
  if(f)loadPdfFile(f);
}
async function loadEditPdf(e){const f=e.target.files[0];e.target.value='';if(f)await loadPdfFile(f);}

async function loadPdfFile(file){
  showProg(true);setProg(5,'PDF 로드 중...');
  try{
    const ab=await file.arrayBuffer();
    const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    E.fname=file.name.replace(/\.pdf$/i,'');
    E.pages=Array.from({length:doc.getPageCount()},(_,i)=>({srcDoc:doc,srcIdx:i,sel:false,isCopy:false}));
    document.getElementById('dz-edit').style.display='none';
    document.getElementById('editArea').style.display='block';
    await renderThumbs();updateSel();
  }catch(err){alert2('오류',err.message);showProg(false);}
}

const jsCache=new Map();
async function getJsPdf(pdfLibDoc){
  if(jsCache.has(pdfLibDoc))return jsCache.get(pdfLibDoc);
  const b=await pdfLibDoc.save();
  const d=await pdfjsLib.getDocument({data:b}).promise;
  jsCache.set(pdfLibDoc,d);return d;
}

async function renderThumbs(){
  const grid=document.getElementById('pageGrid');
  grid.innerHTML='';
  const n=E.pages.length;
  for(let i=0;i<n;i++){
    setProg(Math.round(5+(i/n)*88),`썸네일 (${i+1}/${n})`);
    const pg=E.pages[i];
    const card=document.createElement('div');
    card.className='page-card';card.dataset.idx=i;
    card.innerHTML=`<div class="page-thumb"><span class="ls">⏳</span></div>
      <div class="page-footer">
        <span class="page-num">p.${i+1}</span>
        <input type="checkbox" class="page-check" id="chk${i}" onchange="onChk(${i})">
      </div>${pg.isCopy?'<span class="page-copy-badge">복사</span>':''}`;
    card.addEventListener('click',e=>{if(e.target.type==='checkbox')return;toggle(i);});
    dragSetup(card,i);
    grid.appendChild(card);
    (async()=>{
      try{
        const jd=await getJsPdf(pg.srcDoc);
        const p=await jd.getPage(pg.srcIdx+1);
        const vp=p.getViewport({scale:1});
        const sc=Math.min(280/vp.width,400/vp.height);
        const svp=p.getViewport({scale:sc});
        const cv=document.createElement('canvas');
        cv.width=svp.width;cv.height=svp.height;
        const ctx=cv.getContext('2d');
        ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
        await p.render({canvasContext:ctx,viewport:svp}).promise;
        const th=card.querySelector('.page-thumb');th.innerHTML='';th.appendChild(cv);
      }catch{card.querySelector('.page-thumb').innerHTML='<span style="font-size:10px;color:#aaa">미리보기 없음</span>';}
    })();
  }
  setProg(100,'완료!');setTimeout(()=>showProg(false),700);
}

function toggle(i){E.pages[i].sel=!E.pages[i].sel;document.getElementById('chk'+i).checked=E.pages[i].sel;document.getElementById('pageGrid').children[i].classList.toggle('selected',E.pages[i].sel);updateSel();}
function onChk(i){E.pages[i].sel=document.getElementById('chk'+i).checked;document.getElementById('pageGrid').children[i].classList.toggle('selected',E.pages[i].sel);updateSel();}
function updateSel(){document.getElementById('selCount').textContent=`선택: ${E.pages.filter(p=>p.sel).length} / ${E.pages.length}`;}

function editSelectAll(){E.pages.forEach((_,i)=>{E.pages[i].sel=true;document.getElementById('chk'+i).checked=true;document.getElementById('pageGrid').children[i].classList.add('selected');});updateSel();}
function editSelectNone(){E.pages.forEach((_,i)=>{E.pages[i].sel=false;document.getElementById('chk'+i).checked=false;document.getElementById('pageGrid').children[i].classList.remove('selected');});updateSel();}

function editMoveUp(){const a=E.pages;for(let i=1;i<a.length;i++)if(a[i].sel&&!a[i-1].sel)[a[i-1],a[i]]=[a[i],a[i-1]];renderThumbs();}
function editMoveDown(){const a=E.pages;for(let i=a.length-2;i>=0;i--)if(a[i].sel&&!a[i+1].sel)[a[i],a[i+1]]=[a[i+1],a[i]];renderThumbs();}

function editCopy(){
  const c=E.pages.filter(p=>p.sel).map(p=>({...p,isCopy:true,sel:false}));
  if(!c.length){alert2('알림','복사할 페이지를 선택하세요.');return;}
  const last=E.pages.map((p,i)=>p.sel?i:-1).filter(i=>i>=0).pop()??E.pages.length-1;
  E.pages.splice(last+1,0,...c);renderThumbs();updateSel();
}
function editDelete(){
  if(!E.pages.some(p=>p.sel)){alert2('알림','삭제할 페이지를 선택하세요.');return;}
  if(!E.pages.some(p=>!p.sel)){alert2('알림','모든 페이지를 삭제할 수 없습니다.');return;}
  E.pages=E.pages.filter(p=>!p.sel);renderThumbs();updateSel();
}

async function editInsertPdf(e){
  const file=e.target.files[0];e.target.value='';if(!file)return;
  showProg(true);setProg(10,'PDF 삽입 중...');
  try{
    const doc=await PDFLib.PDFDocument.load(await file.arrayBuffer(),{ignoreEncryption:true});
    const last=E.pages.map((p,i)=>p.sel?i:-1).filter(i=>i>=0).pop()??E.pages.length-1;
    E.pages.splice(last+1,0,...Array.from({length:doc.getPageCount()},(_,i)=>({srcDoc:doc,srcIdx:i,sel:false,isCopy:false})));
    await renderThumbs();updateSel();
  }catch(err){alert2('오류',err.message);showProg(false);}
}

async function editSave(){
  if(!E.pages.length){alert2('알림','페이지가 없습니다.');return;}
  showProg(true);setProg(5,'PDF 생성 중...');
  try{
    const out=await PDFLib.PDFDocument.create();
    const map=new Map();
    for(const p of E.pages){
      if(!map.has(p.srcDoc)){
        const idxs=[...new Set(E.pages.filter(x=>x.srcDoc===p.srcDoc).map(x=>x.srcIdx))];
        map.set(p.srcDoc,{idxs,copied:await out.copyPages(p.srcDoc,idxs)});
      }
    }
    E.pages.forEach((p,i)=>{
      setProg(5+Math.round(i/E.pages.length*90),'합치는 중...');
      const {idxs,copied}=map.get(p.srcDoc);
      out.addPage(copied[idxs.indexOf(p.srcIdx)]);
    });
    const bytes=await out.save();
    if(E.blobUrl)URL.revokeObjectURL(E.blobUrl);
    E.blobUrl=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));
    Object.assign(document.createElement('a'),{href:E.blobUrl,download:E.fname+'_edited.pdf'}).click();
    setProg(100,'저장 완료!');setTimeout(()=>showProg(false),800);
  }catch(err){alert2('오류',err.message);showProg(false);}
}

/* 드래그 */
function dragSetup(card,idx){
  card.draggable=true;
  card.addEventListener('dragstart',e=>{E.dragSrc=+card.dataset.idx;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.page-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));});
  card.addEventListener('dragover',e=>{e.preventDefault();const s=E.dragSrc,t=+card.dataset.idx;document.querySelectorAll('.page-card').forEach(c=>c.classList.remove('drag-over-top','drag-over-bottom'));if(s!==t)card.classList.add(t>s?'drag-over-bottom':'drag-over-top');});
  card.addEventListener('drop',e=>{e.preventDefault();const s=E.dragSrc,t=+card.dataset.idx;if(s===t)return;const m=E.pages.splice(s,1)[0];E.pages.splice(s<t?t:t,0,m);renderThumbs();updateSel();E.dragSrc=-1;});
}

/* UI 유틸 */
function showProg(v){document.getElementById('prog').style.display=v?'block':'none';}
function setProg(p,m){document.getElementById('progTxt').textContent=m;document.getElementById('progFill').style.width=p+'%';}
function alert2(t,b){document.getElementById('modal-title').textContent=t;document.getElementById('modal-body').textContent=b;document.getElementById('modal').classList.add('show');}
window.addEventListener('beforeunload',()=>{if(E.blobUrl)URL.revokeObjectURL(E.blobUrl);});
</script>
</body>
</html>
