<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DB 통합 연결</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy:      #0f1e3d;
            --navy-mid:  #1a3160;
            --blue:      #1e4fa8;
            --blue-lit:  #2b63cc;
            --accent:    #1a5ccc;
            --gold:      #b08a2a;
            --text:      #e8edf5;
            --text-dim:  #8fa0bc;
            --bg:        #ffffff;
            --card-bg:   rgba(20, 36, 72, 0.7);
            --glow-blue: rgba(78, 154, 241, 0.35);
            --glow-gold: rgba(201, 168, 76, 0.3);
        }

        html, body {
            height: 100%;
            background: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            user-select: none;
            overflow: hidden;
        }

        /* ── 배경 그리드 패턴 ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(30,79,168,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,79,168,0.06) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }

        /* ── 중앙 글로우 ── */
        body::after {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 700px; height: 400px;
            background: radial-gradient(ellipse, rgba(30,79,168,0.07) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        .page-wrap {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 0;
        }

        /* ── 헤더 타이틀 ── */
        .header {
            text-align: center;
            margin-bottom: 42px;
        }
        .header .badge {
            display: inline-block;
            font-size: 9pt; font-weight: 600; letter-spacing: 0.18em;
            color: #1a5ccc;
            border: 1px solid rgba(26,92,204,0.4);
            border-radius: 20px;
            padding: 4px 14px;
            margin-bottom: 14px;
            text-transform: uppercase;
        }
        .header h1 {
            font-size: 22pt; font-weight: 700;
            color: #1a2a4a;
            letter-spacing: -0.01em;
        }
        .header p {
            font-size: 9.5pt; color: #5a6a84;
            margin-top: 6px; font-weight: 400;
        }

        /* ── 버튼 컨테이너 ── */
        .btn-group {
            display: flex; flex-direction: column; gap: 12px;
        }

        /* ── 공통 버튼 ── */
        .btn {
            position: relative;
            display: flex; align-items: center; gap: 14px;
            width: 420px; padding: 14px 20px;
            border: none; border-radius: 11px;
            cursor: pointer;
            overflow: hidden;
            text-align: left;

            /* 3D 입체감을 위한 기본 shadow */
            box-shadow:
                0 6px 0px rgba(0,0,0,0.55),
                0 10px 30px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.12);

            transform: translateY(0);
            transition:
                transform 0.08s ease,
                box-shadow 0.08s ease,
                filter 0.15s ease;
        }

        /* 버튼 – 눌렸을 때 */
        .btn:active {
            transform: translateY(5px);
            box-shadow:
                0 1px 0px rgba(0,0,0,0.5),
                0 3px 10px rgba(0,0,0,0.25),
                inset 0 2px 4px rgba(0,0,0,0.3);
            filter: brightness(0.9);
        }

        /* 버튼 – 호버 */
        .btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow:
                0 8px 0px rgba(0,0,0,0.55),
                0 16px 40px rgba(0,0,0,0.35),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* 버튼 – 심사 */
        .btn-review {
            background: linear-gradient(135deg, #1a3f9e 0%, #0e2566 60%, #0a1a4a 100%);
        }
        .btn-review::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(78,154,241,0.15) 0%, transparent 60%);
            border-radius: 14px;
        }
        .btn-review:hover {
            box-shadow:
                0 8px 0px rgba(0,0,0,0.55),
                0 16px 50px var(--glow-blue),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* 버튼 – 감리 */
        .btn-inspection {
            background: linear-gradient(135deg, #1a2a5e 0%, #0d1a40 60%, #060d25 100%);
        }
        .btn-inspection::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, transparent 60%);
            border-radius: 14px;
        }
        .btn-inspection:hover {
            box-shadow:
                0 8px 0px rgba(0,0,0,0.55),
                0 16px 50px var(--glow-gold),
                inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* 아이콘 원형 배경 */
        .btn-icon {
            position: relative; z-index: 1;
            display: flex; align-items: center; justify-content: center;
            width: 38px; height: 38px;
            border-radius: 9px;
            flex-shrink: 0;
            font-size: 16px;
        }
        .btn-review .btn-icon  { background: rgba(78,154,241,0.2); }
        .btn-inspection .btn-icon { background: rgba(201,168,76,0.15); }

        /* 텍스트 영역 */
        .btn-text { position: relative; z-index: 1; }
        .btn-text .title {
            font-size: 11pt; font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            display: block;
        }
        .btn-text .sub {
            font-size: 7.5pt; font-weight: 300;
            color: var(--text-dim);
            margin-top: 3px;
            display: block;
        }
        .btn-review .btn-text .sub  { color: rgba(160,190,240,0.7); }
        .btn-inspection .btn-text .sub { color: rgba(200,180,120,0.6); }

        /* 우측 화살표 */
        .btn-arrow {
            position: absolute; right: 24px; top: 50%;
            transform: translateY(-50%);
            font-size: 18px; z-index: 1;
            opacity: 0.35;
            transition: opacity 0.2s, right 0.2s;
        }
        .btn:hover .btn-arrow { opacity: 0.7; right: 18px; }

        /* 테두리 라인 (상단) */
        .btn-review  { border-top: 1px solid rgba(78,154,241,0.4); }
        .btn-inspection { border-top: 1px solid rgba(201,168,76,0.25); }

        /* ── 우클릭 금지 안내 ── */
        .footer-note {
            margin-top: 28px;
            font-size: 8pt; color: #7a8aa0;
            letter-spacing: 0.08em;
        }

        /* ════════════════════════════════
           오버레이 / iframe 뷰어
        ════════════════════════════════ */
        #overlay {
            display: none;
            position: fixed; inset: 0; z-index: 999;
            background: rgba(4, 9, 22, 0.88);
            backdrop-filter: blur(6px);
            animation: fadeIn 0.22s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #viewer-wrap {
            position: absolute;
            top: 5vh; left: 50%; transform: translateX(-50%);
            width: min(96vw, 1280px);
            height: 88vh;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(78,154,241,0.25);
            display: flex; flex-direction: column;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        #viewer-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px;
            height: 44px;
            background: #f0f4fa;
            border-bottom: 1px solid #d0d8e8;
            flex-shrink: 0;
        }
        #viewer-title {
            font-size: 10pt; font-weight: 600;
            color: #1a2a4a; letter-spacing: 0.04em;
        }
        #btn-close {
            width: 32px; height: 32px;
            border: none; border-radius: 8px;
            background: rgba(0,0,0,0.06);
            color: #5a6a84;
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        #btn-close:hover { background: rgba(220,60,60,0.8); color: white; }

        #viewer-frame {
            flex: 1;
            border: none; width: 100%; height: 100%;
            background: white;
        }

        /* 클립보드 안내 (iframe 차단 시 fallback) */
        #fallback-msg {
            display: none;
            flex: 1;
            flex-direction: column;
            align-items: center; justify-content: center;
            background: #ffffff;
            color: #1a2a4a; text-align: center;
            padding: 40px;
        }
        #fallback-msg h2 { font-size: 14pt; margin-bottom: 12px; color: #1a5ccc; }
        #fallback-msg p  { font-size: 10pt; color: #5a6a84; line-height: 1.8; }
        #fallback-path {
            margin-top: 18px;
            padding: 12px 20px;
            background: #f0f4fa;
            border: 1px solid #d0d8e8;
            border-radius: 8px;
            font-size: 9pt; color: #1a5ccc;
            word-break: break-all; letter-spacing: 0.02em;
        }

        /* 우클릭 금지 컨텍스트 메뉴 표시 억제 안내 토스트 */
        #toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(20, 36, 72, 0.95);
            border: 1px solid rgba(78,154,241,0.35);
            color: var(--accent);
            padding: 10px 22px; border-radius: 30px;
            font-size: 9pt; font-weight: 600;
            letter-spacing: 0.08em;
            z-index: 9999;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="header">
        <div class="badge">KICPA · 내부 DB 조회 시스템</div>
        <h1>DB 통합 연결</h1>
        <p>아래 버튼을 클릭하여 해당 DB 파일을 열람합니다</p>
    </div>

    <div class="btn-group">
        <button class="btn btn-review"
            onclick="openDB('file:///C:/Users/KICPA/JYLIM/work/DB조회/심사DB/review_final.html', '심사조치안 DB')">
            <div class="btn-icon">📋</div>
            <div class="btn-text">
                <span class="title">심사조치안 DB</span>
                <span class="sub">내 컴퓨터 내 · review_final.html</span>
            </div>
            <span class="btn-arrow">›</span>
        </button>

        <button class="btn btn-inspection"
            onclick="openDB('file:///C:/Users/KICPA/JYLIM/work/DB조회/감리DB/inspection_final.html', '감리조치안 DB')">
            <div class="btn-icon">🔍</div>
            <div class="btn-text">
                <span class="title">감리조치안 DB</span>
                <span class="sub">내 컴퓨터 내 · inspection_final.html</span>
            </div>
            <span class="btn-arrow">›</span>
        </button>
    </div>

    <div class="footer-note">⚠ 우클릭 및 텍스트 선택이 제한된 보안 페이지입니다</div>
</div>

<!-- ══ 뷰어 오버레이 ══ -->
<div id="overlay" onclick="closeOverlay(event)">
    <div id="viewer-wrap" onclick="event.stopPropagation()">
        <div id="viewer-bar">
            <span id="viewer-title">DB 뷰어</span>
            <button id="btn-close" onclick="closeViewer()" title="닫기">✕</button>
        </div>
        <iframe id="viewer-frame" src="about:blank" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        <div id="fallback-msg">
            <h2>⚠ 브라우저 보안 정책으로 직접 열람이 제한됩니다</h2>
            <p>아래 경로를 복사하여 브라우저 주소창에 붙여넣기 하세요.<br>(Ctrl+V)</p>
            <div id="fallback-path"></div>
        </div>
    </div>
</div>

<!-- 토스트 메시지 -->
<div id="toast">🚫 우클릭이 제한된 페이지입니다</div>

<script>
    /* ── 우클릭 금지 ── */
    document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        showToast();
    });

    /* ── 토스트 ── */
    let toastTimer;
    function showToast() {
        const t = document.getElementById('toast');
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
    }

    /* ── DB 열기 ── */
    function openDB(filePath, title) {
        const overlay = document.getElementById('overlay');
        const frame   = document.getElementById('viewer-frame');
        const titleEl = document.getElementById('viewer-title');
        const fallback= document.getElementById('fallback-msg');
        const pathEl  = document.getElementById('fallback-path');

        titleEl.textContent = title;
        overlay.style.display = 'block';

        // iframe으로 로딩 시도
        frame.style.display = 'block';
        fallback.style.display = 'none';
        frame.src = filePath;

        // 로딩 실패 감지 (file:// 차단 시 fallback)
        frame.onerror = function() {
            showFallback(filePath, fallback, pathEl, frame);
        };

        // 일부 브라우저는 onerror 미지원 → 1초 후 about:blank인지 확인
        setTimeout(function() {
            try {
                const loc = frame.contentWindow && frame.contentWindow.location.href;
                if (!loc || loc === 'about:blank') {
                    showFallback(filePath, fallback, pathEl, frame);
                }
            } catch(e) {
                // cross-origin 접근 에러 = 로딩은 됐지만 보안 차단 (표시는 됨)
            }
        }, 1200);

    }

    function showFallback(filePath, fallbackEl, pathEl, frame) {
        frame.style.display = 'none';
        fallbackEl.style.display = 'flex';
        pathEl.textContent = filePath;

        // 주소 자동 클립보드 복사
        navigator.clipboard.writeText(filePath)
            .then(() => showCopyToast('✅ 주소가 자동으로 복사되었습니다. 주소창에 Ctrl+V 하세요.'))
            .catch(() => {
                // clipboard API 차단 시 execCommand fallback
                try {
                    const tmp = document.createElement('textarea');
                    tmp.value = filePath;
                    tmp.style.cssText = 'position:fixed;opacity:0';
                    document.body.appendChild(tmp);
                    tmp.select();
                    document.execCommand('copy');
                    document.body.removeChild(tmp);
                    showCopyToast('✅ 주소가 자동으로 복사되었습니다. 주소창에 Ctrl+V 하세요.');
                } catch(e) {
                    showCopyToast('⚠ 자동 복사 실패 — 위 경로를 직접 복사해 주세요.');
                }
            });
    }

    /* ── 복사 전용 토스트 ── */
    let copyToastTimer;
    function showCopyToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(copyToastTimer);
        copyToastTimer = setTimeout(() => {
            t.classList.remove('show');
            // 토스트 메시지 원복
            setTimeout(() => { t.textContent = '🚫 우클릭이 제한된 페이지입니다'; }, 400);
        }, 3500);
    }

    /* ── 오버레이 닫기 ── */
    function closeViewer() {
        const overlay = document.getElementById('overlay');
        const frame   = document.getElementById('viewer-frame');
        overlay.style.display = 'none';
        frame.src = 'about:blank';
    }

    function closeOverlay(e) {
        if (e.target === document.getElementById('overlay')) closeViewer();
    }

    /* ESC 키 닫기 */
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeViewer();
    });
</script>
</body>
</html>
