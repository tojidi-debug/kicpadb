<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DB 통합 연결</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #f0f4f8; font-family: 'Verdana', sans-serif;
        }
        .container { text-align: center; }
        .btn {
            display: block; width: 650px; padding: 25px; margin: 15px;
            font-size: 20pt; color: white; text-decoration: none;
            border-radius: 15px; cursor: pointer; border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;
            text-align: center; line-height: 1.2;
        }
        .btn-review { background-color: #1e3a8a; }
        .btn-review:hover { background-color: #1e40af; }
        .btn-inspection { background-color: navy; }
        .btn-inspection:hover { background-color: #000050; }
        .small-text { font-size: 8pt; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-review" onclick="processDB('file:///C:/Users/KICPA/JYLIM/work/DB조회/심사DB/review_final.html')">
        심사조치안 <span class="small-text">(내 컴퓨터내)</span> DB 폴더 열기
    </button>

    <button class="btn btn-inspection" onclick="processDB('file:///C:/Users/KICPA/JYLIM/work/DB조회/감리DB/inspection_final.html')">
        감리조치안 <span class="small-text">(내 컴퓨터내)</span> DB 폴더 열기
    </button>
</div>

<script>
    function processDB(fullPath) {
        // 1. 클립보드에 주소 복사 (사용자가 혹시 몰라 붙여넣을 수 있도록 대비)
        navigator.clipboard.writeText(fullPath);

        // 2. 사용자에게 안내 메시지 출력 (확인만 누르면 됨)
        const userAction = confirm("보안상 바로 열 수 없습니다.\n\n[방법]\n확인을 누른 후, 'DB' 창의 주소창에서 Ctrl+V를 눌러주세요.\n(브라우저 정책상 자동 입력은 불가능합니다.)");
        
        if (userAction) {
            // 3. 'DB'라는 이름의 새 탭을 열고 포커스
            const dbWin = window.open('about:blank', 'DB');
            if (dbWin) {
                dbWin.focus();
            }
        }
    }
</script>

</body>
</html>
