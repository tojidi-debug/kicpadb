<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>감리조치안 DB 접속</title>
    <style>
        body, html {
            height: 100%; margin: 0;
            display: flex; justify-content: center; align-items: center;
            background-color: #f4f7f9; font-family: 'Verdana', sans-serif;
        }
        .db-button {
            padding: 20px 40px; font-size: 20pt; color: white;
            background-color: navy; border: none; border-radius: 10px;
            cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);

        .db-button:hover { background-color: #000050; }

</head>
<body>

    <button type="button" class="db-button" onclick="openLocalFile()">
        내 컴퓨터 내 파일로 연결) 감리조치안 DB
    </button>

    <script>
        function openLocalFile() {
            const filePath = "file:///C:/Users/KICPA/JYLIM/work/DB조회/감리DB/inspection_final.html";
            
            // 새 창을 먼저 열고 주소를 이동시킴
            const newWindow = window.open('about:blank', 'DB');
            if (newWindow) {
                newWindow.location.href = filePath;
            } else {
                alert("팝업이 차단되었습니다. 브라우저 설정에서 팝업을 허용해주세요.");
            }
        }
    </script>

</body>
</html>
